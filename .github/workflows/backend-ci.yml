# Continuous integration for the FastAPI backend (no deploy).
name: Backend CI

on:
  push:
    branches: [main, "chore/**"]
    paths:
      - "backend/**"
      - "main.py"
      - "requirements.txt"
      - "tests/**"
      - "pytest.ini"
      - "alembic.ini"
      - "migrations/**"
      - ".github/workflows/backend-ci.yml"
  pull_request:
    branches: [main, "chore/**"]
    paths:
      - "backend/**"
      - "main.py"
      - "requirements.txt"
      - "tests/**"
      - "pytest.ini"
      - "alembic.ini"
      - "migrations/**"
      - ".github/workflows/backend-ci.yml"

jobs:
  backend-ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Byte-compile Python (syntax check)
        run: python -m compileall -q main.py backend

      - name: Pytest (API smoke tests)
        run: python -m pytest tests/
