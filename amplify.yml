# AWS Amplify: monorepo — Next.js lives in /frontend
# https://docs.aws.amazon.com/amplify/latest/userguide/monorepo-configuration.html
version: 1
applications:
  - appRoot: frontend
    frontend:
      phases:
        preBuild:
          commands:
            - npm ci
        build:
          commands:
            - npm run build
      artifacts:
        baseDirectory: .next
        files:
          - "**/*"
      cache:
        paths:
          - node_modules/**/*
